<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Grades Table</title>

<style>

/* Page styling */
body {
    font-family: Arial, sans-serif;
    background-color: #f4f4f4;
    padding: 40px;
}

/* Table styling */
table {
    width: 70%;
    margin: auto;
    border-collapse: collapse;
    background-color: white;
    box-shadow: 0 0 10px gray;
}

/* Caption */
caption {
    font-size: 24px;
    font-weight: bold;
    padding: 10px;
}

/* Table header */
th {
    background-color: #333;
    color: white;
    padding: 12px;
    border: 1px solid black;
}

/* Table cells */
td {
    padding: 12px;
    text-align: center;
    border: 1px solid black;
}

/* Alternate row colors */
tr:nth-child(even) {
    background-color: #f2f2f2;
}

/* Hover effect */
tr:hover {
    background-color: #ffe5b4;
    cursor: pointer;
}

</style>

</head>
<body>

<table>

<caption>Student Grades Report</caption>

<tr>
    <th>ID</th>
    <th>Name</th>
    <th>Subject</th>
    <th>Marks</th>
    <th>Grade</th>
</tr>

<tr>
    <td>101</td>

</tr>

</tr>

</tr>

</table>

</body>
</html>
